{% extends "users/base.html" %}

{% block content %}
<div class="register-card">
    <h1 class="register-title">
        <i class="fas fa-brain"></i> 
        Второй мозг
    </h1>
    <div class="register-subtitle">Восстановление доступа</div>

    <!-- ШАГ 1: email и код (оба поля видны сразу) -->
    <div id="step-email-code" class="step">
        <!-- Email с кнопкой "Отправить код" -->
        <div class="input-group">
            <label class="input-label">Электронная почта</label>
            <div class="input-with-button">
                <input type="email" class="input-field" id="email-input" placeholder="your@email.com" autofocus>
                <button type="button" class="btn-small" id="send-code-btn">Отправить код</button>
            </div>
            <div class="input-error" id="email-error"></div>
        </div>

        <!-- Код подтверждения (виден сразу) -->
        <div class="input-group" style="margin-top: 16px;">
            <label class="input-label">Код подтверждения</label>
            <input type="text" class="input-field" id="code-input" placeholder="6 цифр" maxlength="6">
            <div class="input-error" id="code-error"></div>
        </div>

        <div class="button-row">
            <button type="button" class="btn-primary" id="verify-code-btn" disabled>Подтвердить</button>
            <button type="button" class="btn-small" id="cancel-btn">Отмена</button>
        </div>
    </div>

    <!-- ШАГ 2: новый пароль (изначально скрыт) -->
    <div id="step-password" class="step step-hidden">
        <!-- Новый пароль с глазом -->
        <div class="input-group">
            <label class="input-label">Новый пароль</label>
            <div style="position: relative;">
                <input type="password" class="input-field" id="new-password" placeholder="минимум 8 символов" style="padding-right: 40px;">
                <span class="password-toggle" onclick="togglePassword('new-password', this)">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
            <div class="input-error" id="new-password-error"></div>
        </div>

        <!-- Подтверждение пароля с глазом -->
        <div class="input-group">
            <label class="input-label">Подтверждение пароля</label>
            <div style="position: relative;">
                <input type="password" class="input-field" id="confirm-password" placeholder="повторите пароль" style="padding-right: 40px;">
                <span class="password-toggle" onclick="togglePassword('confirm-password', this)">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
            <div class="input-error" id="confirm-password-error"></div>
        </div>

        <!-- Кнопка сброса пароля (стандартная btn-primary) -->
        <button type="button" class="btn-primary" id="reset-password-btn" style="width: 100%; margin-top: 16px;" disabled>Сбросить пароль</button>
    </div>

    <!-- Ссылки на вход и регистрацию -->
    <div class="footer-links">
        <a hx-get="{% url 'users:login' %}" hx-target="#main-content" hx-push-url="true">Вход</a>
        <a hx-get="{% url 'users:register' %}" hx-target="#main-content" hx-push-url="true">Регистрация</a>
    </div>
</div>

<style>
    /* Стили для сообщений об ошибках */
    .input-error {
        color: #ff4d4d;
        font-size: 12px;
        margin-top: 4px;
        min-height: 18px;
    }

    /* Иконка глаза для пароля */
    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #B0B0C0;
        font-size: 18px;
        transition: color 0.2s;
        z-index: 2;
    }
    .password-toggle:hover {
        color: #E07A5F;
    }

    /* Адаптация для узких экранов */
    @media (max-width: 480px) {
        .btn-small, .btn-primary {
            padding: 12px 10px;
            font-size: 13px;
        }
        .button-row {
            flex-direction: column;
        }
    }

    /* ===== Специфичные стили для страницы восстановления ===== */
    
    /* 1. Кнопка отправки кода (рядом с полем email) */
    #step-email-code .input-with-button {
        align-items: stretch;
    }
    #step-email-code .input-with-button .btn-small {
        height: 48px;                /* равна высоте поля ввода */
        min-width: 120px;             /* фиксированная ширина, чтобы текст "Повтор (02:45)" не ломал кнопку */
        padding: 0 12px;
        border-radius: 14px;          /* как у поля */
        font-size: 14px;
        font-weight: 600;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        white-space: nowrap;
        transition: all 0.2s ease;
    }
    /* Убираем scale при нажатии, оставляем только смещение */
    #step-email-code .input-with-button .btn-small:hover {
        transform: translateY(-2px);
    }
    #step-email-code .input-with-button .btn-small:active {
        transform: translateY(1px);
        scale: 1;
    }
    /* Для заблокированной кнопки (таймер) */
    #step-email-code .input-with-button .btn-small:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    /* 2. Контейнер для парных кнопок (Подтвердить / Отмена) */
    #step-email-code .button-row {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    /* Общие правила для обеих кнопок в ряду */
    #step-email-code .button-row .btn-primary,
    #step-email-code .button-row .btn-small {
        flex: 1;                      /* равная ширина */
        height: 48px;                  /* одинаковая высота с полями */
        padding: 0 12px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 30px;           /* компромиссный радиус, чтобы визуально сочетались */
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0;                 /* убираем отступ, который есть у .btn-primary в base */
        line-height: 1;
        white-space: nowrap;
        transition: all 0.2s ease;
        cursor: pointer;
        border: none;
        box-shadow: none;              /* сбросим лишние тени */
    }

    /* Специфические цвета */
    #step-email-code .button-row .btn-primary {
        background: #E07A5F;
        color: white;
    }
    #step-email-code .button-row .btn-small {
        background: rgba(224, 122, 95, 0.1);
        border: 1px solid rgba(224, 122, 95, 0.25);
        color: #E07A5F;
    }

    /* Эффекты при наведении (как в base) */
    #step-email-code .button-row .btn-primary:hover {
        background: #c96b51;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
    }
    #step-email-code .button-row .btn-small:hover {
        background: rgba(224, 122, 95, 0.2);
        border-color: #E07A5F;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
    }

    /* При нажатии — только смещение, без scale */
    #step-email-code .button-row .btn-primary:active,
    #step-email-code .button-row .btn-small:active {
        transform: translateY(1px);
        box-shadow: none;
    }

    /* Отключённое состояние */
    #step-email-code .button-row .btn-primary:disabled,
    #step-email-code .button-row .btn-small:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    /* Стили для кнопки сброса пароля (второй шаг) — как у кнопки "Подтвердить" */
    #step-password .btn-primary {
        height: 48px;
        padding: 0 16px;
        font-size: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 16px;
        border-radius: 40px;
        background: #E07A5F;
        color: white;
        border: none;
        box-shadow: none;
        transition: all 0.2s ease;
        cursor: pointer;
        width: 100%;                     /* как в исходной разметке */
    }
    #step-password .btn-primary:hover {
        background: #c96b51;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
    }
    #step-password .btn-primary:active {
        transform: translateY(1px);
        box-shadow: none;
    }
    #step-password .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }
</style>

<script>
    (function() {
        // Элементы шагов
        const stepEmailCode = document.getElementById('step-email-code');
        const stepPassword = document.getElementById('step-password');
        
        // Элементы первого шага
        const emailInput = document.getElementById('email-input');
        const sendCodeBtn = document.getElementById('send-code-btn');
        const codeInput = document.getElementById('code-input');
        const verifyBtn = document.getElementById('verify-code-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        
        // Элементы второго шага
        const newPass = document.getElementById('new-password');
        const confirmPass = document.getElementById('confirm-password');
        const resetBtn = document.getElementById('reset-password-btn');
        
        // Элементы для ошибок
        const emailError = document.getElementById('email-error');
        const codeError = document.getElementById('code-error');
        const newPassError = document.getElementById('new-password-error');
        const confirmPassError = document.getElementById('confirm-password-error');

        // Демо-данные
        const EXISTING_EMAIL = 'ivan@example.com';
        const CORRECT_CODE = '123456';

        // Состояние
        let codeSent = false;
        let timerInterval = null;
        let timeLeft = 0;

        // Валидация email
        function validateEmail(email) {
            // Проверяем, что строка не пустая, содержит '@' и хотя бы одну точку после '@'
            return /^.+@.+\..+$/.test(email);
        }

        // Проверка существования email (демо)
        function emailExists(email) {
            return email === EXISTING_EMAIL;
        }

        // Валидация кода (6 цифр)
        function validateCode(code) {
            return /^\d{6}$/.test(code);
        }

        // Валидация пароля (сложная)
        function validatePassword(password) {
            if (password.length < 8) return false;
            if (!/^[A-Za-z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+$/.test(password)) return false;
            if (!/[A-Z]/.test(password)) return false;
            if (!/[a-z]/.test(password)) return false;
            if (!/[0-9]/.test(password)) return false;
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) return false;
            return true;
        }

        // Обновление кнопки подтверждения
        function updateVerifyButton() {
            const code = codeInput.value.trim();
            if (validateCode(code) && codeSent) {
                verifyBtn.disabled = false;
                codeError.innerText = '';
            } else {
                verifyBtn.disabled = true;
                if (code.length > 0 && !validateCode(code)) {
                    codeError.innerText = 'Код должен состоять из 6 цифр';
                } else if (!codeSent) {
                    codeError.innerText = 'Сначала отправьте код';
                } else {
                    codeError.innerText = '';
                }
            }
        }

        // Обновление кнопки сброса пароля
        function updateResetButton() {
            const pass = newPass.value;
            const confirm = confirmPass.value;
            
            let valid = true;
            
            if (pass.length === 0) {
                newPassError.innerText = '';
                valid = false;
            } else if (pass.length < 8) {
                newPassError.innerText = 'Минимум 8 символов';
                valid = false;
            } else if (!/^[A-Za-z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+$/.test(pass)) {
                newPassError.innerText = 'Только латинские буквы, цифры и спецсимволы';
                valid = false;
            } else if (!/[A-Z]/.test(pass)) {
                newPassError.innerText = 'Должна быть хотя бы одна заглавная латинская буква';
                valid = false;
            } else if (!/[a-z]/.test(pass)) {
                newPassError.innerText = 'Должна быть хотя бы одна строчная латинская буква';
                valid = false;
            } else if (!/[0-9]/.test(pass)) {
                newPassError.innerText = 'Должна быть хотя бы одна цифра';
                valid = false;
            } else if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pass)) {
                newPassError.innerText = 'Должен быть хотя бы один спецсимвол';
                valid = false;
            } else {
                newPassError.innerText = '';
            }
            
            if (pass !== confirm) {
                confirmPassError.innerText = confirm.length === 0 ? '' : 'Пароли не совпадают';
                valid = false;
            } else {
                confirmPassError.innerText = '';
            }
            
            resetBtn.disabled = !(valid && validatePassword(pass) && pass === confirm);
        }

        // Таймер на 3 минуты
        function startTimer(duration) {
            timeLeft = duration;
            sendCodeBtn.disabled = true;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = 'Отправить код';
                } else {
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    sendCodeBtn.textContent = `Повтор (${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')})`;
                }
            }, 1000);
        }

        // Кнопка "Отправить код"
        sendCodeBtn.addEventListener('click', function() {
            const email = emailInput.value.trim();
            
            if (!validateEmail(email)) {
                emailError.innerText = 'Введите корректный email';
                return;
            }
            
            if (!emailExists(email)) {
                emailError.innerText = 'Пользователь с таким email не найден';
                return;
            }
            
            emailError.innerText = '';
            alert('✅ Код отправлен на почту (демо). Используйте 123456');
            
            codeSent = true;
            startTimer(180);
            codeInput.focus();
            updateVerifyButton();
        });

        codeInput.addEventListener('input', updateVerifyButton);

        verifyBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            if (!validateCode(code)) {
                codeError.innerText = 'Введите 6-значный код';
                return;
            }
            if (code !== CORRECT_CODE) {
                codeError.innerText = 'Неверный код';
                return;
            }
            stepEmailCode.style.display = 'none';
            stepPassword.classList.remove('step-hidden');
            newPass.focus();
            updateResetButton();
        });

        cancelBtn.addEventListener('click', function() {
            htmx.ajax('GET', '{% url "users:login" %}', {target: '#main-content', pushUrl: true});
        });

        newPass.addEventListener('input', updateResetButton);
        confirmPass.addEventListener('input', updateResetButton);

        resetBtn.addEventListener('click', function() {
            if (!validatePassword(newPass.value) || newPass.value !== confirmPass.value) {
                updateResetButton();
                return;
            }
            alert('✅ Пароль успешно изменён (демо). Теперь вы можете войти.');
            htmx.ajax('GET', '{% url "users:login" %}', {target: '#main-content', pushUrl: true});
        });

        // Обработка Enter
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (validateEmail(emailInput.value.trim()) && emailExists(emailInput.value.trim())) {
                    sendCodeBtn.click();
                } else {
                    emailError.innerText = 'Введите корректный email';
                }
            }
        });

        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (codeSent && validateCode(codeInput.value.trim())) {
                    verifyBtn.click();
                } else if (!codeSent) {
                    codeError.innerText = 'Сначала отправьте код';
                } else {
                    codeError.innerText = 'Введите 6-значный код';
                }
            }
        });

        newPass.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (validatePassword(newPass.value)) {
                    confirmPass.focus();
                }
            }
        });

        confirmPass.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (validatePassword(newPass.value) && newPass.value === confirmPass.value) {
                    resetBtn.click();
                } else {
                    updateResetButton();
                }
            }
        });

        // Показать/скрыть пароль
        window.togglePassword = function(inputId, iconElement) {
            const input = document.getElementById(inputId);
            const icon = iconElement.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        emailInput.focus();
        updateVerifyButton();
        updateResetButton();
    })();
</script>
{% endblock %}
