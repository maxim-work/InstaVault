<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход · Второй мозг</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        /* === ОСНОВНЫЕ СТИЛИ (изначальные + добавленные) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #030304;
            color: #E1E1E6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ---------- насыщенный фон с глубиной ---------- */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            top: -20vmax;
            left: -10vmax;
            background: radial-gradient(circle at 30% 30%, rgba(224, 122, 95, 0.15) 0%, transparent 60%);
            filter: blur(80px);
            animation: float 20s ease-in-out infinite alternate;
        }

        .glow-2 {
            position: absolute;
            width: 80vmax;
            height: 80vmax;
            bottom: -30vmax;
            right: -15vmax;
            background: radial-gradient(circle at 70% 70%, rgba(100, 160, 220, 0.12) 0%, transparent 60%);
            filter: blur(100px);
            animation: float 25s ease-in-out infinite alternate-reverse;
        }

        .glow-3 {
            position: absolute;
            width: 50vmax;
            height: 50vmax;
            top: 40%;
            left: 20%;
            background: radial-gradient(circle, rgba(224, 122, 95, 0.08) 0%, transparent 70%);
            filter: blur(60px);
            animation: float 18s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        .decor-line {
            position: fixed;
            background: rgba(224, 122, 95, 0.03);
            border-radius: 100px;
            filter: blur(20px);
            z-index: 1;
            pointer-events: none;
        }

        .decor-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            right: -50px;
            background: rgba(224, 122, 95, 0.05);
            border-radius: 50%;
            filter: blur(50px);
        }

        .decor-2 {
            width: 200px;
            height: 200px;
            bottom: 20px;
            left: -30px;
            background: rgba(130, 180, 240, 0.05);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(40px);
            animation: morph 15s infinite alternate;
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg); }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: rotate(10deg); }
        }

        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* карточка входа / регистрации / восстановления */
        .register-card {
            width: 480px;
            max-width: 100%;
            background: rgba(12, 12, 15, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(224, 122, 95, 0.1) inset;
            padding: 32px;
            transition: all 0.3s;
        }

        .register-title {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .register-title i {
            color: #E07A5F;
            font-size: 32px;
        }

        .register-subtitle {
            font-size: 14px;
            color: #B0B0C0;
            margin-bottom: 32px;
            border-left: 3px solid #E07A5F;
            padding-left: 16px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #B0B0C0;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .input-field:focus {
            outline: none;
            border-color: #E07A5F;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.2);
        }

        /* группа поля с кнопкой */
        .input-with-button {
            display: flex;
            gap: 8px;
        }

        .input-with-button .input-field {
            flex: 1;
        }

       .btn-small {
            background: rgba(224, 122, 95, 0.1);
            border: 1px solid rgba(224, 122, 95, 0.25);
            border-radius: 30px;          /* единый радиус */
            padding: 0 12px;               /* единые отступы */
            color: #E07A5F;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 48px;                  /* фиксированная высота */
            line-height: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;        /* граница внутри высоты */
            backdrop-filter: blur(5px);
        }

        .btn-small:hover:not(:disabled) {
            background: rgba(224, 122, 95, 0.2);
            border-color: #E07A5F;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
        }

        .btn-small:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: none;
        }

        .btn-small:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ссылки под карточкой */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 28px;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #B0B0C0;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
            position: relative;
        }

        .footer-links a:hover {
            color: #E07A5F;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #E07A5F;
            transition: width 0.2s;
        }

        .footer-links a:hover::after {
            width: 100%;
        }

        .input-hint {
            font-size: 12px;
            color: #6B6B7A;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-hint i {
            color: #E07A5F;
            font-size: 10px;
        }

        /* классы для переключения шагов (восстановление пароля) */
        .step {
            display: block;
        }
        .step-hidden {
            display: none;
        }

        @media (max-width: 500px) {
            .register-card {
                padding: 24px 20px;
            }
            .input-with-button {
                flex-wrap: wrap;
            }
            .btn-small {
                width: 100%;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Фоновые декорации (без изменений) -->
    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="glow-3"></div>
    </div>
    <div class="grid-overlay"></div>
    <div class="decor-line decor-1"></div>
    <div class="decor-line decor-2"></div>

    <div id="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
